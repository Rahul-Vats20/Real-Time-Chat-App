# nginx/nexchat.conf
# Production nginx config for NexChat
# - SSL termination (TLS 1.2/1.3 only)
# - HTTP → HTTPS redirect
# - WebSocket proxy with upgrade headers
# - Gzip compression
# - Static file caching
# - Rate limiting at edge
# - Health check endpoint

# ── Rate limiting zones ────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=connections:10m;

# ── Upstream Node.js workers ───────────────────────────────
upstream nexchat_backend {
    # Sticky sessions via IP hash (required for Socket.io without Redis adapter)
    ip_hash;

    server 127.0.0.1:3001;
    server 127.0.0.1:3002;
    server 127.0.0.1:3003;
    server 127.0.0.1:3004;

    # Health checks (requires nginx Plus; remove for open-source nginx)
    # health_check interval=10s fails=3 passes=2;

    keepalive 64;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Security headers ──────────────────────────────
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Connection limits ─────────────────────────────
    limit_conn connections 50;

    # ── Gzip ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── Static files with long cache ─────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        root /var/www/nexchat/client/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri @backend;
    }

    # ── Uploads directory ─────────────────────────────
    location /uploads/ {
        root /var/www/nexchat/client/public;
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options nosniff;
        # Security: only serve known image/document types
        location ~* \.(jpg|jpeg|png|gif|webp|pdf|txt)$ { }
        location ~* \.(php|exe|sh|bat)$ { return 403; }
    }

    # ── Auth endpoints (stricter rate limit) ─────────
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://nexchat_backend;
        include /etc/nginx/proxy_params;
    }

    # ── Socket.io WebSocket upgrade ───────────────────
    location /socket.io/ {
        proxy_pass http://nexchat_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;   # 24h for long-lived WS connections
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # ── API endpoints ─────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://nexchat_backend;
        include /etc/nginx/proxy_params;
    }

    # ── Health check (no rate limit, no logging) ──────
    location /health {
        proxy_pass http://nexchat_backend;
        access_log off;
    }

    # ── SPA fallback ──────────────────────────────────
    location / {
        proxy_pass http://nexchat_backend;
        include /etc/nginx/proxy_params;
    }

    # ── Access and error logs ─────────────────────────
    access_log /var/log/nginx/nexchat_access.log combined;
    error_log  /var/log/nginx/nexchat_error.log warn;
}
