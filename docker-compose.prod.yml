version: '3.8'

# ── Production docker-compose ──────────────────────────────
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in secrets
#   2. Place SSL certs in ./ssl/ (or use certbot service below)
#   3. Set DOMAIN= in your .env

services:

  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexchat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatdb}
      POSTGRES_USER: ${POSTGRES_USER:-chatuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./server/schema_additions.sql:/docker-entrypoint-initdb.d/02-schema_additions.sql
      - ./server/schema_v3.sql:/docker-entrypoint-initdb.d/03-schema_v3.sql
      - ./server/schema_v4.sql:/docker-entrypoint-initdb.d/04-schema_v4.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatuser} -d ${POSTGRES_DB:-chatdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal
    # Don't expose PostgreSQL port in production
    # ports: ["5432:5432"]

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexchat-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  # ── Node.js server (scaled to 4 replicas) ────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-chatdb}
      POSTGRES_USER: ${POSTGRES_USER:-chatuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://yourdomain.com}
      ADMIN_USERS: ${ADMIN_USERS:-}
    volumes:
      - uploads_data:/app/client/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    deploy:
      replicas: 4
      update_config:
        parallelism: 1         # rolling deploy, one at a time
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/metrics/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Nginx ────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nexchat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nexchat.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - ./client/public:/var/www/nexchat/client/public:ro
      - uploads_data:/var/www/nexchat/client/public/uploads:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - server
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Certbot (Let's Encrypt SSL) ──────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: nexchat-certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Run once to obtain cert, then comment out or run via cron
    # command: certonly --webroot --webroot-path=/var/www/certbot -d yourdomain.com --email admin@yourdomain.com --agree-tos --no-eff-email
    profiles:
      - ssl   # only run with: docker compose --profile ssl up certbot

  # ── PgBackup (daily backups to volume) ──────────────────
  pgbackup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: nexchat-pgbackup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-chatdb}
      POSTGRES_USER: ${POSTGRES_USER:-chatuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - backups_data:/backups
    depends_on:
      - postgres
    networks:
      - internal

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  certbot_data:
    driver: local
  certbot_www:
    driver: local
  nginx_logs:
    driver: local
  backups_data:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true   # no direct internet access for backend services
  external:
    driver: bridge   # only nginx has internet access
