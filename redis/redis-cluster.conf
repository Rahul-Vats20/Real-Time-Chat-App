# redis/redis-cluster.conf
# Redis Cluster configuration for production
# Enables automatic sharding across 6 nodes (3 primary + 3 replica)
#
# Usage:
#   redis-server /path/to/redis-cluster.conf
#
# Setup cluster after starting all nodes:
#   redis-cli --cluster create \
#     127.0.0.1:7001 127.0.0.1:7002 127.0.0.1:7003 \
#     127.0.0.1:7004 127.0.0.1:7005 127.0.0.1:7006 \
#     --cluster-replicas 1

# ── Network ────────────────────────────────────────────────
port 7001                          # Change per node: 7001-7006
bind 0.0.0.0
protected-mode yes
requirepass "your-strong-password-here"
masterauth "your-strong-password-here"

# ── Cluster ───────────────────────────────────────────────
cluster-enabled yes
cluster-config-file nodes-7001.conf  # Unique per node
cluster-node-timeout 5000
cluster-announce-ip 127.0.0.1       # Set to node's actual IP in production
cluster-announce-port 7001
cluster-announce-bus-port 17001     # Gossip port = port + 10000

# ── Persistence ───────────────────────────────────────────
appendonly yes
appendfilename "appendonly-7001.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── Memory ────────────────────────────────────────────────
maxmemory 1gb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# ── Performance ───────────────────────────────────────────
tcp-backlog 511
hz 15
dynamic-hz yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ── Logging ───────────────────────────────────────────────
loglevel notice
logfile /var/log/redis/redis-7001.log
