# .github/workflows/ci.yml
# NexChat CI/CD Pipeline
#
# Jobs:
#   lint      → ESLint + basic checks
#   test      → Unit + integration tests against real PostgreSQL + Redis
#   build     → Docker image build + push to GHCR
#   deploy    → SSH deploy to production (on main branch only)

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/nexchat-server

jobs:
  # ── 1. Lint & static checks ──────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install deps
        working-directory: server
        run: npm ci

      - name: Check for syntax errors
        working-directory: server
        run: |
          for f in $(find . -name "*.js" -not -path "*/node_modules/*"); do
            node --check "$f" && echo "✅ $f" || { echo "❌ Syntax error in $f"; exit 1; }
          done

      - name: Validate package.json
        working-directory: server
        run: node -e "require('./package.json')"

      - name: Check for hardcoded secrets
        run: |
          if grep -rn --include="*.js" \
            -e "password123" -e "secret123" -e "changeme" \
            server/ --exclude-dir=node_modules; then
            echo "❌ Potential hardcoded secret found"
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

  # ── 2. Tests ─────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chatdb_test
          POSTGRES_USER: chatuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      NODE_ENV: test
      PORT: 3001
      JWT_SECRET: ci-test-secret-not-for-production
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: chatdb_test
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: testpassword
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      ALLOWED_ORIGINS: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Apply database schema
        working-directory: server
        run: |
          PGPASSWORD=testpassword psql -h localhost -U chatuser -d chatdb_test -f schema.sql
          PGPASSWORD=testpassword psql -h localhost -U chatuser -d chatdb_test -f schema_additions.sql
          PGPASSWORD=testpassword psql -h localhost -U chatuser -d chatdb_test -f schema_v3.sql
          PGPASSWORD=testpassword psql -h localhost -U chatuser -d chatdb_test -f schema_v4.sql

      - name: Start server in background
        working-directory: server
        run: |
          node index.js &
          echo $! > /tmp/server.pid
          # Wait for server to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/health && break
            echo "Waiting for server... ($i/30)"
            sleep 1
          done

      - name: Run REST API tests
        working-directory: server
        run: |
          TEST_URL=http://localhost:3001 node ../tests/chat.test.js
        timeout-minutes: 3

      - name: Run WebSocket integration tests
        working-directory: server
        run: |
          TEST_URL=http://localhost:3001 node ../tests/websocket.test.js
        timeout-minutes: 3

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) 2>/dev/null || true
          fi

  # ── 3. Build Docker image ─────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ── 4. Deploy to production ───────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://yourdomain.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/nexchat

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull server

            # Rolling deploy (one replica at a time)
            docker compose -f docker-compose.prod.yml up -d --no-deps server

            # Health check
            sleep 10
            curl -sf https://yourdomain.com/health || {
              echo "Health check failed, rolling back"
              docker compose -f docker-compose.prod.yml rollback server
              exit 1
            }

            # Clean up old images
            docker image prune -f

            echo "✅ Deployed successfully"

      - name: Notify on success
        if: success()
        run: |
          echo "🚀 Deployed ${{ github.sha }} to production"
          # Add Slack/Discord webhook notification here

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed for ${{ github.sha }}"
